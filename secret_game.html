<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>last game</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; overflow: hidden; }
        .card { border: 2px solid #0f0; position: relative; z-index: 10; background: rgba(0, 10, 0, 0.9); }
        
        /* Фон "Матрица" */
        #matrix-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            font-size: 10px; color: #003300; pointer-events: none; z-index: 1;
        }

        #hack-console {
            font-family: 'Courier New', monospace;
            height: 200px; overflow: hidden;
            margin: 20px 0; padding: 10px;
            background: #050505; border: 1px inset #0f0;
            position: relative;
        }

        .code-line { display: block; white-space: nowrap; opacity: 0.7; }
        .real-target { 
            color: #55ff55; /* Чуть светлее остальных */
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 
            0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } 
        }

        #timer { font-size: 2rem; color: #ff3131; font-weight: bold; }
        
        .failure-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: red; z-index: 9999; justify-content: center; align-items: center;
            color: white; font-size: 5rem;
        }
    </style>
</head>
<body>

<div id="matrix-bg"></div>

<div class="card">
    <h1 style="color: #0f0; -webkit-text-fill-color: #0f0;">ВЗЛОМ УРОВНЯ: ULTRA</h1>
    <p>Внимание, Дамир! Система обнаружила вторжение.</p>
    <p>Найди 4-значный <span style="color: #55ff55;">ПУЛЬСИРУЮЩИЙ</span> код в потоке данных.</p>
    
    <div id="timer">15</div>

    <div id="hack-console">
        <div id="data-flow"></div>
    </div>

    <input type="text" id="hack-input" placeholder="CODE" 
           style="background: #000; border: 1px solid #0f0; color: #0f0; font-size: 2rem; width: 150px; text-align: center;">
    <br><br>
    <button onclick="attemptHack()" style="background: #0f0; color: #000;">ВЗЛОМАТЬ</button>
</div>

<div id="failure" class="failure-overlay">КРИТИЧЕСКАЯ ОШИБКА</div>

<script>
    const secretCode = Math.floor(1000 + Math.random() * 8999).toString();
    let timeLeft = 15;
    const timerEl = document.getElementById('timer');
    const flowEl = document.getElementById('data-flow');

    // Интервал обновления потока данных
    setInterval(() => {
        let line = "";
        for(let j=0; j<5; j++) {
            let randomNum = Math.floor(1000 + Math.random() * 8999);
            // Вставляем секретный код случайно
            if(Math.random() > 0.92) {
                line += `<span class="real-target">${secretCode}</span> `;
            } else {
                line += `<span>${randomNum}</span> `;
            }
        }
        const div = document.createElement('div');
        div.className = 'code-line';
        div.innerHTML = line;
        flowEl.prepend(div);
        if(flowEl.children.length > 10) flowEl.lastChild.remove();
    }, 150);

    // Таймер
    const countdown = setInterval(() => {
        timeLeft--;
        timerEl.innerText = timeLeft;
        if(timeLeft <= 0) {
            clearInterval(countdown);
            systemFailure();
        }
    }, 1000);

    function attemptHack() {
        const input = document.getElementById('hack-input').value;
        if(input === secretCode) {
            clearInterval(countdown);
            alert("Как ты заметил слепошара?. Ладно проходи дальше.");
            location.href = "real_video.html";
        } else {
            systemFailure();
        }
    }

    function systemFailure() {
        document.getElementById('failure').style.display = 'flex';
        setTimeout(() => {
            location.reload();
        }, 1000);
    }

    // Фоновая "Матрица"
    const bg = document.getElementById('matrix-bg');
    for(let i=0; i<50; i++) {
        bg.innerHTML += Math.random().toString(36).substring(2, 15) + "<br>";
    }
</script>

</body>
</html>
